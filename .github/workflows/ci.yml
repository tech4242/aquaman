name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - name: Cache npm download cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install npm dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm rebuild keytar esbuild oxlint
      # Block the build only on vulnerabilities in dependencies we actually
      # ship (proxy/plugin/coder). Dev/test-only deps (vitest/vite/esbuild, the
      # openclaw e2e harness and its bundled hono/protobufjs/tar) never reach a
      # published tarball, and openclaw's transitive tree churns advisories we
      # don't control — gating on them would wedge CI without protecting users.
      - name: npm audit — block on high+ in shipped deps
        run: npm audit --omit=dev --audit-level=high
      # Surface dev-dependency advisories for awareness, without blocking.
      - name: npm audit — dev deps (informational)
        run: npm audit --audit-level=high || true
      - run: npm run lint
      - run: npm run typecheck

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - name: Cache npm download cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install npm dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm rebuild keytar esbuild oxlint
      - run: npm test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - name: Cache npm download cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install npm dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm rebuild keytar esbuild oxlint
      - run: npm run test:coverage
      - uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: true

  e2e-openclaw:
    name: E2E OpenClaw Plugin
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - name: Cache npm download cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: Install npm dependencies
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm rebuild keytar esbuild oxlint
      - name: Cache openclaw global install
        id: cache-openclaw
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/node_modules/openclaw
            /usr/local/bin/openclaw
          key: openclaw-${{ runner.os }}-node24-2026.6.6
      - name: Install openclaw
        if: steps.cache-openclaw.outputs.cache-hit != 'true'
        run: |
          npm install -g openclaw@2026.6.6 --ignore-scripts
          npm rebuild -g openclaw
      - run: npx vitest run test/e2e/openclaw-plugin.test.ts

      - name: Install plugin for security audit
        run: |
          # Build the plugin (manifest now points at ./dist/index.js)
          npm run build -w aquaman-plugin

          rm -rf ~/.openclaw/extensions/aquaman-plugin
          mkdir -p ~/.openclaw/extensions/aquaman-plugin
          cp packages/plugin/package.json ~/.openclaw/extensions/aquaman-plugin/
          cp packages/plugin/openclaw.plugin.json ~/.openclaw/extensions/aquaman-plugin/
          cp -r packages/plugin/dist ~/.openclaw/extensions/aquaman-plugin/dist

          # Link local proxy build (aquaman-proxy@0.11.0 isn't published yet)
          mkdir -p ~/.openclaw/extensions/aquaman-plugin/node_modules/.bin
          ln -sf $(pwd)/packages/proxy ~/.openclaw/extensions/aquaman-plugin/node_modules/aquaman-proxy
          ln -sf $(pwd)/node_modules/.bin/aquaman ~/.openclaw/extensions/aquaman-plugin/node_modules/.bin/aquaman

          # Install remaining deps (undici etc.)
          cd ~/.openclaw/extensions/aquaman-plugin && npm install --omit=dev --silent --legacy-peer-deps

          # Write openclaw.json with plugin allowlist (but no tools.profile —
          # that's the operator's choice, not ours to impose)
          cat > ~/.openclaw/openclaw.json << 'EOF'
          {
            "plugins": {
              "allow": ["aquaman-plugin"],
              "entries": {
                "aquaman-plugin": {
                  "enabled": true,
                  "config": {
                    "backend": "encrypted-file",
                    "services": ["anthropic", "openai"]
                  }
                }
              }
            }
          }
          EOF

      - name: OpenClaw security audit
        run: |
          OUTPUT=$(openclaw security audit --deep 2>&1) || true
          echo "$OUTPUT"

          # Filter to aquaman-plugin findings only
          AQUAMAN_FINDINGS=$(echo "$OUTPUT" | grep -i "aquaman-plugin" || true)

          if [ -z "$AQUAMAN_FINDINGS" ]; then
            echo "No aquaman-plugin findings"
            exit 0
          fi

          # Expected findings (not aquaman code issues):
          # 1. dangerous-exec on proxy-manager.ts — true positive, plugin spawns proxy process
          # 2. tools_reachable_permissive_policy — environment advisory, not a code vulnerability;
          #    operator chooses their own tools.profile, aquaman should not force "coding" mode
          UNEXPECTED=$(echo "$AQUAMAN_FINDINGS" \
            | grep -v -e "dangerous-exec.*proxy-manager" \
            | grep -v -e "code_safety.*dangerous code patterns" \
            | grep -v -e "tools_reachable_permissive_policy" \
            | grep -v -e "Enabled extension plugins:" \
            | grep -v -e "permissive tool policy" \
            || true)

          if [ -n "$UNEXPECTED" ]; then
            echo "UNEXPECTED scanner findings:"
            echo "$UNEXPECTED"
            exit 1
          fi

          echo "Only expected findings: dangerous-exec on proxy-manager.ts, tools_reachable_permissive_policy (env advisory)"

  e2e-hermes:
    name: Hermes Python plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run aquaman-hermes plugin tests
        working-directory: packages/hermes
        run: uv run --with pytest python -m pytest tests/ -q
