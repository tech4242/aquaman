name: CD

# Publishes aquaman to npm, PyPI, and ClawHub when a GitHub release is published.
# A version gate runs first: every version field + inter-package dep pin must
# equal the release tag, or nothing publishes.

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate versions match the release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - id: check
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"          # v0.13.0 -> 0.13.0
          echo "Release tag version: $TAG"
          # Source of truth is the tag: stamp every version field from it, so a
          # forgotten manual bump can't block or mis-version a release.
          node scripts/set-version.mjs "$TAG"
          # The asserts below now GUARD the setter — they only fail if a NEW
          # version field was added to the repo without being added to
          # scripts/set-version.mjs. (Kept intentionally — cheap insurance.)
          fail=0
          assert() { # name, actual
            if [ "$2" != "$TAG" ]; then echo "::error::$1 = '$2' (expected '$TAG')"; fail=1
            else echo "ok  $1 = $2"; fi
          }
          assert "root package.json"          "$(jq -r .version package.json)"
          assert "proxy package.json"         "$(jq -r .version packages/proxy/package.json)"
          assert "plugin package.json"        "$(jq -r .version packages/plugin/package.json)"
          assert "coder package.json"         "$(jq -r .version packages/coder/package.json)"
          assert "openclaw.plugin.json"       "$(jq -r .version packages/plugin/openclaw.plugin.json)"
          assert "plugin->aquaman-proxy dep"  "$(jq -r '.dependencies["aquaman-proxy"]' packages/plugin/package.json)"
          assert "coder->aquaman-proxy dep"   "$(jq -r '.dependencies["aquaman-proxy"]' packages/coder/package.json)"
          assert "pyproject.toml"             "$(python3 -c "import tomllib;print(tomllib.load(open('packages/hermes/pyproject.toml','rb'))['project']['version'])")"
          assert "hermes plugin.yaml"         "$(grep -E '^version:' packages/hermes/aquaman_hermes/plugin.yaml | sed -E 's/^version:[[:space:]]*"?([^"]*)"?/\1/')"
          if [ "$fail" = 1 ]; then echo "::error::version mismatch — aborting release"; exit 1; fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  npm-publish:
    name: Publish to npm (proxy -> plugin -> coder)
    needs: validate-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write            # npm provenance
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm rebuild keytar esbuild oxlint
      - run: node scripts/set-version.mjs "${{ needs.validate-version.outputs.version }}"   # stamp versions from the tag
      - run: npm run build
      - run: npm test            # ship only what passes
      # Order matters: proxy first — plugin & coder pin it at an exact version.
      # Each publish runs its own prepublishOnly (clean && build), so dist is fresh.
      - run: npm publish --workspace=aquaman-proxy --access public --provenance
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - run: npm publish --workspace=aquaman-plugin --access public --provenance
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }
      - run: npm publish --workspace=aquaman-coder --access public --provenance
        env: { NODE_AUTH_TOKEN: "${{ secrets.NPM_TOKEN }}" }

  pypi-publish:
    name: Publish to PyPI (aquaman-hermes)
    needs: validate-version
    runs-on: ubuntu-latest
    permissions:
      id-token: write            # PyPI Trusted Publishing (no token needed)
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Test before publish
        working-directory: packages/hermes
        run: uv run --with pytest python -m pytest tests/ -q
      - name: Stamp version from the release tag
        run: node scripts/set-version.mjs "${{ needs.validate-version.outputs.version }}"
      - name: Build sdist + wheel
        working-directory: packages/hermes
        run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/hermes/dist

  clawhub-publish:
    name: Publish to ClawHub (plugin only)
    needs: [validate-version, npm-publish]   # plugin's aquaman-proxy dep must be on npm first
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: 24 }
      - run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev
      - run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm rebuild keytar esbuild oxlint
      - run: node scripts/set-version.mjs "${{ needs.validate-version.outputs.version }}"   # stamp versions from the tag
      - name: Pin npm install integrity into plugin metadata
        # OpenClaw warns when openclaw.install.npmSpec/expectedIntegrity are
        # missing from a ClawHub package. The npm publish job upstream of this
        # one has already published the plugin tarball, so its dist.integrity
        # is authoritative here. Best-effort: registry propagation can lag a
        # tag push, and the metadata is advisory — never fail the publish on it.
        run: |
          export VERSION="${{ needs.validate-version.outputs.version }}"
          export INTEGRITY=$(npm view "aquaman-plugin@$VERSION" dist.integrity 2>/dev/null || true)
          if [ -n "$INTEGRITY" ]; then
            node -e "
              const fs = require('fs');
              const p = 'packages/plugin/package.json';
              const pkg = JSON.parse(fs.readFileSync(p, 'utf-8'));
              pkg.openclaw = pkg.openclaw ?? {};
              pkg.openclaw.install = {
                npmSpec: 'aquaman-plugin@' + process.env.VERSION,
                expectedIntegrity: process.env.INTEGRITY,
              };
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
            "
            echo "Pinned openclaw.install: aquaman-plugin@$VERSION ($INTEGRITY)"
          else
            echo "::warning::npm view aquaman-plugin@$VERSION dist.integrity returned nothing — publishing without integrity pin"
          fi
      - run: npm run build                     # produce packages/plugin/dist for the bundle
      - run: npm install -g clawhub@latest      # an old CLI gets rejected by the hardened server
      - run: clawhub login --token "$CLAWHUB_TOKEN"
        env: { CLAWHUB_TOKEN: "${{ secrets.CLAWHUB_TOKEN }}" }
      - name: Validate (Plugin Inspector — must be PASS, 0 breakages)
        run: clawhub package validate packages/plugin
      - name: Publish (async-aware)
        run: |
          set -uo pipefail
          VERSION="${{ needs.validate-version.outputs.version }}"

          live() {
            curl -s https://clawhub.ai/api/v1/packages/aquaman-plugin \
              | jq -r '.package.latestVersion // empty'
          }

          # Idempotency guard: a re-run after a ClawHub-side stall must not
          # enqueue a duplicate publish attempt.
          if [ "$(live)" = "$VERSION" ]; then
            echo "aquaman-plugin@$VERSION already live on ClawHub — nothing to do."
            exit 0
          fi

          out=$(clawhub package publish packages/plugin \
            --source-repo tech4242/aquaman \
            --source-commit "${{ github.sha }}" \
            --source-ref main \
            --source-path packages/plugin 2>&1) && status=0 || status=$?
          echo "$out"

          if [ "$status" -ne 0 ]; then
            # ClawHub's staged prepublication (openclaw/clawhub#2979, deployed
            # 2026-07-06) made publish ASYNC: the server accepts with
            # {ok:true,status:"pending",attemptId:...} and creates the release
            # later. clawhub CLI <= 0.23.1 cannot parse that SUCCESS response
            # and exits nonzero with exactly this signature. Treat it as
            # accepted and verify by polling; any other error is a real
            # failure.
            if ! grep -q "packageId: invalid value" <<<"$out"; then
              exit "$status"
            fi
            echo "Accepted by ClawHub (async prepublication pending). Polling for the release..."
          fi

          # Prepublication worker runs ~every 45 min when healthy; poll 15 min
          # and fail visibly if the release hasn't materialized — re-running
          # this job later is safe (see idempotency guard above).
          for i in $(seq 1 90); do
            if [ "$(live)" = "$VERSION" ]; then
              echo "aquaman-plugin@$VERSION is live on ClawHub."
              exit 0
            fi
            sleep 10
          done

          echo "::error::ClawHub has not created the $VERSION release yet — the attempt stays queued server-side. Re-run this job later (idempotent), and check: clawhub package moderation-status aquaman-plugin (context: openclaw/clawhub#2984)"
          exit 1
      - name: Reminder — ClawScan is async
        if: success()
        run: |
          echo "Submitted. ClawScan runs server-side."
          echo "Verify manually:  clawhub package moderation-status aquaman-plugin"

  sync-versions:
    name: Open PR to sync repo versions with the release
    # Only needs the authoritative registries — a flaky/stuck ClawHub must not
    # block syncing the repo. If the maintainer already bumped + committed
    # before tagging, the stamp is a no-op and no PR is opened.
    needs: [validate-version, npm-publish, pypi-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # push the release-sync branch
      pull-requests: write      # open the PR (no PAT needed — creating a PR
                                # doesn't bypass branch protection; merging does)
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main             # base the bump on current main, not the tag
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: Stamp versions from the release tag
        run: node scripts/set-version.mjs "${{ needs.validate-version.outputs.version }}"
      - name: Open sync PR (skips if repo is already in sync)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-version.outputs.version }}"
          if git diff --quiet; then
            echo "main is already at $VERSION — nothing to sync."
            exit 0
          fi
          BRANCH="release-sync/$VERSION"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -am "release: sync versions to $VERSION"
          git push -u origin "$BRANCH" --force-with-lease
          gh pr create --base main --head "$BRANCH" \
            --title "release: sync versions to $VERSION" \
            --body "Automated post-publish sync: stamps all version fields to match the released tag \`v$VERSION\`. The published npm/PyPI artifacts already carry this version; merge to keep \`main\` in sync."
