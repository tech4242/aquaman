version: 2
updates:
  # npm workspaces monorepo: ONE entry, all manifests via `directories`.
  # Single root package-lock.json — security updates were already covered by
  # the lockfile; listing the workspace dirs makes VERSION updates reach the
  # runtime deps declared in packages/*/package.json (the part "/" alone missed).
  - package-ecosystem: npm
    directories:
      - "/"
      - "/packages/*"
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
      # Group SECURITY-update PRs too (separate from the version-update group).
      security:
        applies-to: security-updates
        patterns: ["*"]
    open-pull-requests-limit: 5
    ignore:
      # MAJORS POLICY: no automatic semver-major PRs for npm. Majors in this
      # tree always need human migration (vitest 1->4, oxlint 0.x->1.x) or must
      # track the runtime we actually run (@types/node vs CI's Node version) —
      # they are deliberate, scheduled chores. NOTE: this also suppresses
      # security-update PRs that would require a major; the alert stays visible
      # on the dashboard and the fix is the manual migration.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Workspace-internal exact pins, managed by the release process (the CD
      # version gate asserts them) — dependabot must never touch these.
      - dependency-name: aquaman-proxy
      # AGENT-HOST COMPAT DEPS ARE MANUAL. openclaw is CalVer — dependabot's
      # minor/patch classification is meaningless, and "patch-looking" releases
      # have broken us before (2026.3.23 SDK import removal, 2026.6.5
      # auth-profiles SQLite move). Host support moves deliberately via the
      # compat-watch process (CI pin bump + deep checks + ROADMAP notes), never
      # via auto-bump. (Claude Code and Hermes have no npm dep — their compat
      # is protocol-level and verified against live docs at release time.)
      - dependency-name: openclaw

  # Python plugin (packages/hermes — zero runtime deps, covers dev/build tooling)
  - package-ecosystem: uv
    directory: "/packages/hermes"
    schedule:
      interval: weekly
      day: monday
    ignore:
      # Same agent-host policy as openclaw on the npm side: if hermes-agent is
      # ever added as a test dep, its bumps are manual compat events.
      - dependency-name: hermes-agent

  # GitHub Actions pins in ci.yml / cd.yml / codeql.yml. Majors stay ALLOWED
  # here (unlike npm): action major tags are runner-runtime migrations that
  # GitHub deprecates on its own schedule — pins rot until CI breaks unprompted.
  # One grouped weekly PR keeps them reviewable.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
